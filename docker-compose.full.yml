# Seahorse Agent 全量部署
# 使用: docker compose -f docker-compose.full.yml up -d --build
# 需要: .env 文件（从 .env.full.example 复制）

services:
  # ==================== 基础设施 ====================

  postgres:
    image: docker.m.daocloud.io/pgvector/pgvector:pg16
    container_name: seahorse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seahorse}
      POSTGRES_USER: ${POSTGRES_USER:-seahorse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seahorse}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./resources/database/seahorse_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seahorse} -d ${POSTGRES_DB:-seahorse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: docker.m.daocloud.io/redis:7-alpine
    container_name: seahorse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: docker.m.daocloud.io/elasticsearch/elasticsearch:8.12.0
    container_name: seahorse-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  minio:
    image: docker.m.daocloud.io/minio/minio:latest
    container_name: seahorse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Milvus 向量库 ====================

  milvus-etcd:
    image: docker.m.daocloud.io/quay.io/coreos/etcd:v3.5.18
    container_name: seahorse-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://milvus-etcd:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - milvus-etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  milvus-minio:
    image: docker.m.daocloud.io/minio/minio:latest
    container_name: seahorse-milvus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: milvusadmin
      MINIO_ROOT_PASSWORD: milvusadmin
    volumes:
      - milvus-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  milvus-standalone:
    image: docker.m.daocloud.io/milvusdb/milvus:v2.6.6
    container_name: seahorse-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: milvusadmin
      MINIO_SECRET_ACCESS_KEY: milvusadmin
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  attu:
    image: docker.m.daocloud.io/zilliz/attu:v2.6.3
    container_name: seahorse-attu
    environment:
      MILVUS_URL: milvus-standalone:19530
    ports:
      - "8000:3000"
    depends_on:
      milvus-standalone:
        condition: service_healthy
    restart: unless-stopped

  # ==================== Pulsar 消息队列 ====================

  pulsar-zookeeper:
    image: docker.m.daocloud.io/apachepulsar/pulsar:3.1.3
    container_name: seahorse-pulsar-zk
    command: bin/pulsar zookeeper
    environment:
      PULSAR_MEM: "-Xms256m -Xmx256m -XX:MaxDirectMemorySize=256m"
    ports:
      - "2181:2181"
    volumes:
      - pulsar-zk-data:/pulsar/data/zookeeper
    healthcheck:
      test: ["CMD-SHELL", "bin/pulsar-admin brokers healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  pulsar-bookie:
    image: docker.m.daocloud.io/apachepulsar/pulsar:3.1.3
    container_name: seahorse-pulsar-bookie
    depends_on:
      pulsar-zookeeper:
        condition: service_healthy
    command: >
      bash -c "bin/apply-config-from-env.py conf/bookkeeper.conf &&
      bin/pulsar bookie"
    environment:
      PULSAR_MEM: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m"
      clusterName: standalone
      zkServers: pulsar-zookeeper:2181
      metadataServiceUri: metadata-store:zk:pulsar-zookeeper:2181
      advertisedAddress: pulsar-bookie
    ports:
      - "3181:3181"
    volumes:
      - pulsar-bookie-data:/pulsar/data/bookkeeper
    healthcheck:
      test: ["CMD-SHELL", "bin/bookkeeper shell bookiesanity || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  pulsar-broker:
    image: docker.m.daocloud.io/apachepulsar/pulsar:3.1.3
    container_name: seahorse-pulsar-broker
    depends_on:
      pulsar-zookeeper:
        condition: service_healthy
      pulsar-bookie:
        condition: service_healthy
    command: >
      bash -c "bin/apply-config-from-env.py conf/broker.conf &&
      bin/pulsar broker"
    environment:
      PULSAR_MEM: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m"
      clusterName: standalone
      zookeeperServers: pulsar-zookeeper:2181
      configurationMetadataStoreUrl: zk:pulsar-zookeeper:2181
      managedLedgerDefaultEnsembleSize: 1
      managedLedgerDefaultWriteQuorum: 1
      managedLedgerDefaultAckQuorum: 1
      advertisedAddress: pulsar-broker
    ports:
      - "6650:6650"
      - "8080:8080"
    volumes:
      - pulsar-broker-data:/pulsar/data/broker
    healthcheck:
      test: ["CMD-SHELL", "bin/pulsar-admin brokers healthcheck || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  pulsar-init:
    image: docker.m.daocloud.io/apachepulsar/pulsar:3.1.3
    container_name: seahorse-pulsar-init
    depends_on:
      pulsar-broker:
        condition: service_healthy
    entrypoint: >
      bash -c "
      bin/pulsar-admin clusters create standalone --url http://pulsar-broker:8080 --broker-url pulsar://pulsar-broker:6650 || true &&
      bin/pulsar-admin tenants create seahorse-agent || true &&
      bin/pulsar-admin namespaces create seahorse-agent/ai || true &&
      bin/pulsar-admin topics create-partitioned-topic persistent://seahorse-agent/ai/knowledge-document-chunk -p 4 || true &&
      bin/pulsar-admin topics create-partitioned-topic persistent://seahorse-agent/ai/message-feedback -p 2 || true &&
      echo 'Pulsar topics created successfully'
      "
    restart: "no"

  # ==================== 应用服务 ====================

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: seahorse-backend
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
      pulsar-broker:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SERVER_PORT: "9090"
      # DataSource
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-seahorse}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-seahorse}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-seahorse}
      # 向量库 → Milvus
      SEAHORSE_AGENT_ADAPTERS_VECTOR_TYPE: milvus
      SEAHORSE_AGENT_ADAPTERS_VECTOR_DIMENSION: ${MILVUS_DIMENSION:-1024}
      SEAHORSE_AGENT_ADAPTERS_VECTOR_METRIC_TYPE: ${MILVUS_METRIC_TYPE:-COSINE}
      SEAHORSE_AGENT_ADAPTERS_VECTOR_COLLECTION_NAME: seahorse_default
      SEAHORSE_AGENT_ADAPTERS_VECTOR_MILVUS_HOST: milvus-standalone
      SEAHORSE_AGENT_ADAPTERS_VECTOR_MILVUS_PORT: "19530"
      # 缓存 → Redis
      SEAHORSE_AGENT_ADAPTERS_CACHE_TYPE: redis
      SEAHORSE_AGENT_ADAPTERS_CACHE_REDIS_HOST: redis
      SEAHORSE_AGENT_ADAPTERS_CACHE_REDIS_PORT: "6379"
      # 存储 → MinIO S3
      SEAHORSE_AGENT_ADAPTERS_STORAGE_TYPE: s3
      SEAHORSE_AGENT_ADAPTERS_STORAGE_S3_ENDPOINT: http://minio:9000
      SEAHORSE_AGENT_ADAPTERS_STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      SEAHORSE_AGENT_ADAPTERS_STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      SEAHORSE_AGENT_ADAPTERS_STORAGE_S3_BUCKET: seahorse
      # 消息队列 → Pulsar
      SEAHORSE_AGENT_ADAPTERS_MQ_TYPE: pulsar
      SEAHORSE_AGENT_ADAPTERS_MQ_PULSAR_SERVICE_URL: pulsar://pulsar-broker:6650
      # 观测 → Micrometer
      SEAHORSE_AGENT_ADAPTERS_OBSERVATION_TYPE: micrometer
      # 搜索 → Elasticsearch
      SEAHORSE_AGENT_ADAPTERS_SEARCH_TYPE: elasticsearch
      SEAHORSE_AGENT_ADAPTERS_SEARCH_ELASTICSEARCH_HOST: elasticsearch
      SEAHORSE_AGENT_ADAPTERS_SEARCH_ELASTICSEARCH_PORT: "9200"
      # 仓储
      SEAHORSE_AGENT_ADAPTERS_REPOSITORY_TYPE: jdbc
      # AI 模型
      SEAHORSE_AGENT_ADAPTERS_AI_TYPE: openai-compatible
      SEAHORSE_AGENT_ADAPTERS_AI_BASE_URL: ${SEAHORSE_AGENT_ADAPTERS_AI_BASE_URL:-https://api.openai.com/v1}
      SEAHORSE_AGENT_ADAPTERS_AI_API_KEY: ${SEAHORSE_AGENT_ADAPTERS_AI_API_KEY:-}
      SEAHORSE_AGENT_ADAPTERS_AI_CHAT_MODEL: ${SEAHORSE_AGENT_ADAPTERS_AI_CHAT_MODEL:-}
      SEAHORSE_AGENT_ADAPTERS_AI_EMBEDDING_MODEL: ${SEAHORSE_AGENT_ADAPTERS_AI_EMBEDDING_MODEL:-}
      SEAHORSE_AGENT_ADAPTERS_AI_RERANK_MODEL: ${SEAHORSE_AGENT_ADAPTERS_AI_RERANK_MODEL:-}
    volumes:
      - seahorse-storage:/app/seahorse-agent-storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: seahorse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  es-data:
  minio-data:
  milvus-etcd-data:
  milvus-minio-data:
  milvus-data:
  pulsar-zk-data:
  pulsar-bookie-data:
  pulsar-broker-data:
  seahorse-storage:
