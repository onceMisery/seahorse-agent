# Seahorse Agent 全量部署
# 使用: docker compose -f docker-compose.full.yml up -d --build
# 需要: .env 文件（从 .env.full.example 复制）

services:
  # ==================== 基础设施 ====================

  postgres:
    image: pgvector/pgvector:pg16
    container_name: seahorse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seahorse}
      POSTGRES_USER: ${POSTGRES_USER:-seahorse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seahorse}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./resources/database/seahorse_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seahorse} -d ${POSTGRES_DB:-seahorse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: seahorse-redis
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: seahorse-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: seahorse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: seahorse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set seahorse http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing seahorse/agent-artifacts;
      mc mb --ignore-existing seahorse/conversation-attachments;
      echo 'MinIO buckets initialized successfully';
      "
    restart: "no"

  # ==================== Ollama 向量模型 ====================

  ollama:
    image: ollama/ollama:latest
    container_name: seahorse-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  ollama-init:
    image: curlimages/curl:latest
    container_name: seahorse-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      echo 'Pulling nomic-embed-text model (small, 274MB)...';
      curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"nomic-embed-text\"}';
      echo 'Ollama model initialized successfully';
      "
    restart: "no"

  # ==================== Milvus 向量库 ====================

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: seahorse-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      -advertise-client-urls=http://milvus-etcd:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - milvus-etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  milvus-minio:
    image: minio/minio:latest
    container_name: seahorse-milvus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: milvusadmin
      MINIO_ROOT_PASSWORD: milvusadmin
    volumes:
      - milvus-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  milvus-standalone:
    image: milvusdb/milvus:v2.6.6
    container_name: seahorse-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: milvusadmin
      MINIO_SECRET_ACCESS_KEY: milvusadmin
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  attu:
    image: docker.io/zilliz/attu:v2.6.3
    container_name: seahorse-attu
    environment:
      MILVUS_URL: milvus-standalone:19530
    ports:
      - "8000:3000"
    depends_on:
      milvus-standalone:
        condition: service_healthy
    restart: unless-stopped

  # ==================== Pulsar 消息队列 ====================

  pulsar-zookeeper:
    image: apachepulsar/pulsar:3.1.3
    container_name: seahorse-pulsar-zk
    command: bin/pulsar zookeeper
    environment:
      PULSAR_MEM: "-Xms256m -Xmx256m -XX:MaxDirectMemorySize=256m"
    ports:
      - "2181:2181"
    volumes:
      - pulsar-zk-data:/pulsar/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  pulsar-cluster-init:
    image: apachepulsar/pulsar:3.1.3
    container_name: seahorse-pulsar-cluster-init
    depends_on:
      pulsar-zookeeper:
        condition: service_healthy
    entrypoint: ["bash", "-c", "bin/pulsar initialize-cluster-metadata --cluster standalone --metadata-store zk:pulsar-zookeeper:2181 --configuration-metadata-store zk:pulsar-zookeeper:2181 --web-service-url http://pulsar-broker:8080 --broker-service-url pulsar://pulsar-broker:6650 && echo 'Cluster metadata initialized'"]
    restart: "no"

  pulsar-bookie:
    image: apachepulsar/pulsar:3.1.3
    container_name: seahorse-pulsar-bookie
    depends_on:
      pulsar-zookeeper:
        condition: service_healthy
      pulsar-cluster-init:
        condition: service_completed_successfully
    command: >
      bash -c "bin/apply-config-from-env.py conf/bookkeeper.conf &&
      bin/pulsar bookie"
    environment:
      PULSAR_MEM: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m"
      clusterName: standalone
      zkServers: pulsar-zookeeper:2181
      metadataServiceUri: metadata-store:zk:pulsar-zookeeper:2181
      advertisedAddress: pulsar-bookie
    ports:
      - "3181:3181"
    volumes:
      - pulsar-bookie-data:/pulsar/data
    healthcheck:
      test: ["CMD-SHELL", "bin/bookkeeper shell bookiesanity || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  pulsar-broker:
    image: apachepulsar/pulsar:3.1.3
    container_name: seahorse-pulsar-broker
    depends_on:
      pulsar-zookeeper:
        condition: service_healthy
      pulsar-bookie:
        condition: service_healthy
    command: >
      bash -c "bin/apply-config-from-env.py conf/broker.conf &&
      bin/pulsar broker"
    environment:
      PULSAR_MEM: "-Xms512m -Xmx512m -XX:MaxDirectMemorySize=512m"
      clusterName: standalone
      zookeeperServers: pulsar-zookeeper:2181
      configurationMetadataStoreUrl: zk:pulsar-zookeeper:2181
      managedLedgerDefaultEnsembleSize: 1
      managedLedgerDefaultWriteQuorum: 1
      managedLedgerDefaultAckQuorum: 1
      advertisedAddress: pulsar-broker
    ports:
      - "6650:6650"
      - "8080:8080"
    volumes:
      - pulsar-broker-data:/pulsar/data
    healthcheck:
      test: ["CMD-SHELL", "bin/pulsar-admin brokers healthcheck || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  pulsar-init:
    image: apachepulsar/pulsar:3.1.3
    container_name: seahorse-pulsar-init
    depends_on:
      pulsar-broker:
        condition: service_healthy
    entrypoint: >
      bash -c "
      bin/pulsar-admin clusters create standalone --url http://pulsar-broker:8080 --broker-url pulsar://pulsar-broker:6650 || true &&
      bin/pulsar-admin tenants create seahorse-agent || true &&
      bin/pulsar-admin namespaces create seahorse-agent/ai || true &&
      bin/pulsar-admin topics create-partitioned-topic persistent://seahorse-agent/ai/knowledge-document-chunk -p 4 || true &&
      bin/pulsar-admin topics create-partitioned-topic persistent://seahorse-agent/ai/message-feedback -p 2 || true &&
      echo 'Pulsar topics created successfully'
      "
    restart: "no"

  # ==================== 应用服务 ====================

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.simplified
    container_name: seahorse-backend
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
      pulsar-broker:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      SERVER_PORT: "9090"
      # Redis (for Redisson auto-config)
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      # DataSource
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-seahorse}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-seahorse}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-seahorse}
      # 向量库 → Milvus
      SEAHORSE_AGENT_ADAPTERS_VECTOR_TYPE: milvus
      SEAHORSE_AGENT_ADAPTERS_VECTOR_DIMENSION: 768
      SEAHORSE_AGENT_ADAPTERS_VECTOR_METRIC_TYPE: ${MILVUS_METRIC_TYPE:-COSINE}
      SEAHORSE_AGENT_ADAPTERS_VECTOR_COLLECTION_NAME: seahorse_default
      SEAHORSE_AGENT_ADAPTERS_VECTOR_MILVUS_HOST: milvus-standalone
      SEAHORSE_AGENT_ADAPTERS_VECTOR_MILVUS_PORT: "19530"
      # 缓存 → Redis
      SEAHORSE_AGENT_ADAPTERS_CACHE_TYPE: redis
      SEAHORSE_AGENT_ADAPTERS_CACHE_REDIS_HOST: redis
      SEAHORSE_AGENT_ADAPTERS_CACHE_REDIS_PORT: "6379"
      # 存储 → Local (临时降级,避免S3配置问题)
      SEAHORSE_AGENT_ADAPTERS_STORAGE_TYPE: local
      SEAHORSE_AGENT_ADAPTERS_STORAGE_LOCAL_ROOT: /tmp/seahorse-storage
      # 消息队列 → Pulsar
      SEAHORSE_AGENT_ADAPTERS_MQ_TYPE: pulsar
      SEAHORSE_AGENT_ADAPTERS_MQ_PULSAR_SERVICE_URL: pulsar://pulsar-broker:6650
      # 观测 → Micrometer
      SEAHORSE_AGENT_ADAPTERS_OBSERVATION_TYPE: micrometer
      # 搜索 → Elasticsearch
      SEAHORSE_AGENT_ADAPTERS_KEYWORD_SEARCH_TYPE: elasticsearch
      SEAHORSE_AGENT_ADAPTERS_KEYWORD_SEARCH_ELASTICSEARCH_BASE_URL: http://elasticsearch:9200
      SEAHORSE_AGENT_ADAPTERS_KEYWORD_SEARCH_ELASTICSEARCH_INDEX_NAME: seahorse_keyword_chunk
      SEAHORSE_AGENT_ADAPTERS_KEYWORD_INDEX_TYPE: elasticsearch
      SEAHORSE_AGENT_ADAPTERS_KEYWORD_INDEX_ELASTICSEARCH_BASE_URL: http://elasticsearch:9200
      SEAHORSE_AGENT_ADAPTERS_KEYWORD_INDEX_ELASTICSEARCH_INDEX_NAME: seahorse_keyword_chunk
      # 仓储
      SEAHORSE_AGENT_ADAPTERS_REPOSITORY_TYPE: jdbc
      # Agent runtime
      SEAHORSE_AGENT_CHAT_AGENT_MODE_ENABLED: ${SEAHORSE_AGENT_CHAT_AGENT_MODE_ENABLED:-true}
      SEAHORSE_AGENT_CHAT_AGENT_MAX_STEPS: ${SEAHORSE_AGENT_CHAT_AGENT_MAX_STEPS:-24}
      SEAHORSE_AGENT_CHAT_AGENT_PER_TOOL_TIMEOUT: ${SEAHORSE_AGENT_CHAT_AGENT_PER_TOOL_TIMEOUT:-120s}
      SEAHORSE_AGENT_CHAT_AGENT_MAX_PARALLEL_TOOLS: ${SEAHORSE_AGENT_CHAT_AGENT_MAX_PARALLEL_TOOLS:-1}
      SEAHORSE_AGENT_WEB_SSE_TIMEOUT_MS: ${SEAHORSE_AGENT_WEB_SSE_TIMEOUT_MS:-900000}
      SPRING_MVC_ASYNC_REQUEST_TIMEOUT: ${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:-900000}
      SEAHORSE_AGENT_PRODUCT_MODE: ${SEAHORSE_AGENT_PRODUCT_MODE:-enterprise-platform}
      SEAHORSE_AGENT_ADVANCED_SANDBOX_ENABLED: ${SEAHORSE_AGENT_ADVANCED_SANDBOX_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_CONNECTOR_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_CONNECTOR_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_MCP_TOOL_ENABLED: ${SEAHORSE_AGENT_ADVANCED_MCP_TOOL_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_SECRET_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_SECRET_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_HANDOFF_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_HANDOFF_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_REMOTE_AGENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_REMOTE_AGENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_LOCAL_AGENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_LOCAL_AGENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_INTENT_TREE_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_INTENT_TREE_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_INGESTION_TASK_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_INGESTION_TASK_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_INGESTION_PIPELINE_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_INGESTION_PIPELINE_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_TOOL_CATALOG_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_TOOL_CATALOG_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_SKILL_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_SKILL_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_DEFINITION_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_DEFINITION_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_FACTORY_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_FACTORY_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_TOOL_BINDING_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_TOOL_BINDING_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_RUN_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_RUN_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_EVALUATION_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_EVALUATION_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_PRODUCTION_GATE_ENABLED: ${SEAHORSE_AGENT_ADVANCED_PRODUCTION_GATE_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_ENTERPRISE_PILOT_READINESS_ENABLED: ${SEAHORSE_AGENT_ADVANCED_ENTERPRISE_PILOT_READINESS_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_ROLLOUT_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_ROLLOUT_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_QUOTA_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_QUOTA_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_RESOURCE_ACL_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_RESOURCE_ACL_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_MEMORY_GOVERNANCE_ENABLED: ${SEAHORSE_AGENT_ADVANCED_MEMORY_GOVERNANCE_ENABLED:-true}
      SEAHORSE_AGENT_MEMORY_AGGREGATION_ENABLED: ${SEAHORSE_AGENT_MEMORY_AGGREGATION_ENABLED:-true}
      SEAHORSE_AGENT_MEMORY_AGGREGATION_IDLE_FLUSH_MILLIS: ${SEAHORSE_AGENT_MEMORY_AGGREGATION_IDLE_FLUSH_MILLIS:-30000}
      SEAHORSE_AGENT_MEMORY_AGGREGATION_MAX_TURNS: ${SEAHORSE_AGENT_MEMORY_AGGREGATION_MAX_TURNS:-5}
      SEAHORSE_AGENT_ADVANCED_RAG_EVALUATION_ENABLED: ${SEAHORSE_AGENT_ADVANCED_RAG_EVALUATION_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_METADATA_GOVERNANCE_ENABLED: ${SEAHORSE_AGENT_ADVANCED_METADATA_GOVERNANCE_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AUDIT_LOG_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AUDIT_LOG_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_COST_ANALYTICS_ENABLED: ${SEAHORSE_AGENT_ADVANCED_COST_ANALYTICS_ENABLED:-true}
      # SaaS Operations
      SEAHORSE_AGENT_TENANT_ENABLED: ${SEAHORSE_AGENT_TENANT_ENABLED:-true}
      SEAHORSE_AGENT_BILLING_ENABLED: ${SEAHORSE_AGENT_BILLING_ENABLED:-true}
      SEAHORSE_AGENT_OBSERVABILITY_ALERT_ENABLED: ${SEAHORSE_AGENT_OBSERVABILITY_ALERT_ENABLED:-false}
      SEAHORSE_ALERT_DINGTALK_WEBHOOK: ${SEAHORSE_ALERT_DINGTALK_WEBHOOK:-}
      SEAHORSE_ALERT_DINGTALK_SECRET: ${SEAHORSE_ALERT_DINGTALK_SECRET:-}
      SEAHORSE_AGENT_AUTH_GEOLOCATION_ENABLED: ${SEAHORSE_AGENT_AUTH_GEOLOCATION_ENABLED:-false}
      SEAHORSE_ADMIN_ALLOWED_IPS: ${SEAHORSE_ADMIN_ALLOWED_IPS:-}
      # Actuator (for Prometheus scraping)
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when-authorized
      # AI 模型
      SEAHORSE_AGENT_ADAPTERS_AI_TYPE: openai-compatible
      SEAHORSE_AGENT_ADAPTERS_AI_BASE_URL: ${SEAHORSE_AGENT_ADAPTERS_AI_BASE_URL:-https://api.openai.com/v1}
      SEAHORSE_AGENT_ADAPTERS_AI_API_KEY: ${SEAHORSE_AGENT_ADAPTERS_AI_API_KEY:-}
      SEAHORSE_AGENT_ADAPTERS_AI_CHAT_MODEL: ${SEAHORSE_AGENT_ADAPTERS_AI_CHAT_MODEL:-}
      # 向量化模型 → Ollama (本地小模型 nomic-embed-text)
      SEAHORSE_AGENT_ADAPTERS_AI_EMBEDDING_TYPE: openai-compatible
      SEAHORSE_AGENT_ADAPTERS_AI_EMBEDDING_MODEL: nomic-embed-text
      SEAHORSE_AGENT_ADAPTERS_AI_OPENAI_BASE_URL: http://ollama:11434/v1
      SEAHORSE_AGENT_ADAPTERS_AI_OPENAI_API_KEY: ollama
      SEAHORSE_AGENT_ADAPTERS_AI_RERANK_MODEL: ${SEAHORSE_AGENT_ADAPTERS_AI_RERANK_MODEL:-}
      SEAHORSE_AGENT_ADAPTERS_AI_IMAGE_MODEL: ${SEAHORSE_AGENT_ADAPTERS_AI_IMAGE_MODEL:-}
      SEAHORSE_AGENT_ADAPTERS_AI_VIDEO_MODEL: ${SEAHORSE_AGENT_ADAPTERS_AI_VIDEO_MODEL:-}
    extra_hosts:
      - "apihub.agnes-ai.com:104.18.18.62"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - seahorse-storage:/app/seahorse-agent-storage
    networks:
      - default
      - seahorse-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_SEAHORSE_PRODUCT_MODE: ${VITE_SEAHORSE_PRODUCT_MODE:-enterprise-platform}
        VITE_SEAHORSE_ENABLE_ADVANCED_ADMIN: ${VITE_SEAHORSE_ENABLE_ADVANCED_ADMIN:-true}
    container_name: seahorse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ==================== 可观测性 ====================

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: seahorse-prometheus
    restart: unless-stopped
    ports:
      - "19090:9090"
    volumes:
      - ./resources/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - seahorse-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: seahorse-grafana
    restart: unless-stopped
    ports:
      - "13001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-seahorse}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - seahorse-net

volumes:
  postgres-data:
