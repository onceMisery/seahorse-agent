  milvus-minio-data:
  milvus-data:
  pulsar-zk-data:
  pulsar-bookie-data:
  pulsar-broker-data:
  seahorse-storage:
  prometheus-data:
  grafana-data:

networks:
  seahorse-net:
    driver: bridge
