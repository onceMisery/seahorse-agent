services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: seahorse-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seahorse}
      POSTGRES_USER: ${POSTGRES_USER:-seahorse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seahorse}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./resources/database/seahorse_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seahorse} -d ${POSTGRES_DB:-seahorse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: seahorse-backend
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Server port
      SERVER_PORT: "9090"
      # DataSource
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-seahorse}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-seahorse}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-seahorse}
      # Adapters
      SEAHORSE_AGENT_ADAPTERS_VECTOR_TYPE: noop
      # Optional override. Leave blank to derive dimension from the embedding model.
      SEAHORSE_AGENT_ADAPTERS_VECTOR_DIMENSION: ${SEAHORSE_AGENT_ADAPTERS_VECTOR_DIMENSION:-}
      SEAHORSE_AGENT_ADAPTERS_CACHE_TYPE: local
      SEAHORSE_AGENT_ADAPTERS_STORAGE_TYPE: local
      SEAHORSE_AGENT_ADAPTERS_MQ_TYPE: direct
      SEAHORSE_AGENT_ADAPTERS_OBSERVATION_TYPE: noop
      SEAHORSE_AGENT_ADAPTERS_REPOSITORY_TYPE: jdbc
      # AI Model (override via .env or environment)
      SEAHORSE_AGENT_ADAPTERS_AI_TYPE: openai-compatible
      SEAHORSE_AGENT_ADAPTERS_AI_BASE_URL: ${SEAHORSE_AGENT_ADAPTERS_AI_BASE_URL:-https://api.openai.com/v1}
      SEAHORSE_AGENT_ADAPTERS_AI_API_KEY: ${SEAHORSE_AGENT_ADAPTERS_AI_API_KEY:-}
      SEAHORSE_AGENT_ADAPTERS_AI_CHAT_MODEL: ${SEAHORSE_AGENT_ADAPTERS_AI_CHAT_MODEL:-}
      SEAHORSE_AGENT_ADAPTERS_AI_EMBEDDING_MODEL: ${SEAHORSE_AGENT_ADAPTERS_AI_EMBEDDING_MODEL:-}
      SEAHORSE_AGENT_ADAPTERS_AI_EMBEDDING_MODEL_DIMENSIONS: ${SEAHORSE_AGENT_ADAPTERS_AI_EMBEDDING_MODEL_DIMENSIONS:-}
      SEAHORSE_AGENT_ADAPTERS_AI_RERANK_MODEL: ${SEAHORSE_AGENT_ADAPTERS_AI_RERANK_MODEL:-}
      SEAHORSE_AGENT_ADAPTERS_AI_IMAGE_MODEL: ${SEAHORSE_AGENT_ADAPTERS_AI_IMAGE_MODEL:-}
      SEAHORSE_AGENT_CHAT_AGENT_MAX_STEPS: ${SEAHORSE_AGENT_CHAT_AGENT_MAX_STEPS:-12}
      SEAHORSE_AGENT_WEB_SSE_TIMEOUT_MS: ${SEAHORSE_AGENT_WEB_SSE_TIMEOUT_MS:-900000}
      SPRING_MVC_ASYNC_REQUEST_TIMEOUT: ${SPRING_MVC_ASYNC_REQUEST_TIMEOUT:-900000}
      # Product mode / feature capabilities
      SEAHORSE_AGENT_PRODUCT_MODE: ${SEAHORSE_AGENT_PRODUCT_MODE:-enterprise-platform}
      SEAHORSE_AGENT_ADVANCED_SANDBOX_ENABLED: ${SEAHORSE_AGENT_ADVANCED_SANDBOX_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_CONNECTOR_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_CONNECTOR_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_MCP_TOOL_ENABLED: ${SEAHORSE_AGENT_ADVANCED_MCP_TOOL_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_SECRET_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_SECRET_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_HANDOFF_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_HANDOFF_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_REMOTE_AGENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_REMOTE_AGENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_LOCAL_AGENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_LOCAL_AGENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_INTENT_TREE_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_INTENT_TREE_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_INGESTION_TASK_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_INGESTION_TASK_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_INGESTION_PIPELINE_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_INGESTION_PIPELINE_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_TOOL_CATALOG_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_TOOL_CATALOG_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_SKILL_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_SKILL_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_DEFINITION_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_DEFINITION_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_FACTORY_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_FACTORY_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_TOOL_BINDING_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_TOOL_BINDING_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_RUN_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_RUN_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_EVALUATION_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_EVALUATION_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_PRODUCTION_GATE_ENABLED: ${SEAHORSE_AGENT_ADVANCED_PRODUCTION_GATE_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_ENTERPRISE_PILOT_READINESS_ENABLED: ${SEAHORSE_AGENT_ADVANCED_ENTERPRISE_PILOT_READINESS_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AGENT_ROLLOUT_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AGENT_ROLLOUT_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_QUOTA_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_QUOTA_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_RESOURCE_ACL_MANAGEMENT_ENABLED: ${SEAHORSE_AGENT_ADVANCED_RESOURCE_ACL_MANAGEMENT_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_MEMORY_GOVERNANCE_ENABLED: ${SEAHORSE_AGENT_ADVANCED_MEMORY_GOVERNANCE_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_RAG_EVALUATION_ENABLED: ${SEAHORSE_AGENT_ADVANCED_RAG_EVALUATION_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_METADATA_GOVERNANCE_ENABLED: ${SEAHORSE_AGENT_ADVANCED_METADATA_GOVERNANCE_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_AUDIT_LOG_ENABLED: ${SEAHORSE_AGENT_ADVANCED_AUDIT_LOG_ENABLED:-true}
      SEAHORSE_AGENT_ADVANCED_COST_ANALYTICS_ENABLED: ${SEAHORSE_AGENT_ADVANCED_COST_ANALYTICS_ENABLED:-true}
      # SaaS
      SEAHORSE_AGENT_TENANT_ENABLED: ${SEAHORSE_AGENT_TENANT_ENABLED:-true}
      SEAHORSE_AGENT_BILLING_ENABLED: ${SEAHORSE_AGENT_BILLING_ENABLED:-true}
      SEAHORSE_AGENT_AUTH_GEOLOCATION_ENABLED: ${SEAHORSE_AGENT_AUTH_GEOLOCATION_ENABLED:-false}
      SEAHORSE_ALERT_DINGTALK_WEBHOOK: ${SEAHORSE_ALERT_DINGTALK_WEBHOOK:-}
      SEAHORSE_ALERT_DINGTALK_SECRET: ${SEAHORSE_ALERT_DINGTALK_SECRET:-}
    volumes:
      - seahorse-storage:/app/seahorse-agent-storage
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: seahorse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  seahorse-storage:
