Here is a complete, single-file HTML/CSS solution designed to be production-ready, responsive, and visually aligned with the "Modern Tech" aesthetic using the Redis color palette.

```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redis Project Introduction</title>
    <style>
        :root {
            --primary-color: #DC382D; /* Redis Orange */
            --primary-hover: #b92b22;
            --bg-dark: #0f1115;
            --bg-card: #1a1d24;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #2d323c;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout Utilities */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        section {
            padding: 80px 0;
        }

        h1, h2, h3 {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .section-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 60px;
            font-size: 1.1rem;
        }

        /* Header / Hero */
        header {
            padding: 120px 0 80px;
            text-align: center;
            background: radial-gradient(circle at 50% 0%, rgba(220, 56, 45, 0.15) 0%, transparent 60%);
        }

        .brand-logo {
            color: var(--primary-color);
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: inline-block;
            letter-spacing: 2px;
        }

        .hero-title {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #ccc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-desc {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 12px 32px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        /* Features Grid */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 32px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: rgba(220, 56, 45, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .card h3 {
            font-size: 1.25rem;
            margin-bottom: 12px;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Data Types Showcase */
        .types-container {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }

        .type-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 10px 24px;
            border-radius: 50px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: var(--primary-color);
            transition: all 0.2s;
        }

        .type-pill:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Architecture Diagram (CSS Only) */
        .arch-diagram {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 40px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .arch-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
            align-items: center;
            text-align: center;
        }

        .arch-node {
            background: #252932;
            padding: 20px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
        }

        .arch-node.highlight {
            border: 1px solid var(--primary-color);
            background: rgba(220, 56, 45, 0.05);
        }

        .arch-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .arch-title {
            font-weight: 700;
        }

        .arch-connector {
            height: 2px;
            background: var(--border-color);
            width: 100%;
        }

        /* Use Cases */
        .use-cases-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .case-item {
            border-left: 3px solid var(--primary-color);
            padding-left: 20px;
        }

        .case-item h4 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: white;
        }

        .case-item p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border-color);
            padding: 40px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .arch-grid { grid-template-columns: 1fr; }
            .arch-connector { display: none; }
            section { padding: 50px 0; }
        }
    </style>
</head>
<body>
