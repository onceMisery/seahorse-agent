spring.application.name=seahorse-agent-service
seahorse-agent.kernel.enabled=true
seahorse-agent.kernel.migration-mode=kernel

# Sa-Token: read token from Authorization header (matching frontend)
sa-token.token-name=Authorization

# --- Resilience4j Configuration ---
# CircuitBreaker for chatModel
resilience4j.circuitbreaker.instances.chatModel.sliding-window-size=10
resilience4j.circuitbreaker.instances.chatModel.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.chatModel.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.chatModel.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.chatModel.slow-call-duration-threshold=10s
resilience4j.circuitbreaker.instances.chatModel.slow-call-rate-threshold=80

# TimeLimiter for chatModel
resilience4j.timelimiter.instances.chatModel.timeout-duration=30s
resilience4j.timelimiter.instances.chatModel.cancel-running-future=true

# Retry for chatModel
resilience4j.retry.instances.chatModel.max-attempts=2
resilience4j.retry.instances.chatModel.wait-duration=1s
resilience4j.retry.instances.chatModel.retry-exceptions=java.io.IOException,java.util.concurrent.TimeoutException

# RateLimiter for chatModel
resilience4j.ratelimiter.instances.chatModel.limit-for-period=100
resilience4j.ratelimiter.instances.chatModel.limit-refresh-period=1s
resilience4j.ratelimiter.instances.chatModel.timeout-duration=0s

# --- Timeout Configuration ---
spring.mvc.async.request-timeout=60000
server.tomcat.connection-timeout=20s

# --- MyBatis Plus Configuration ---
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.mapper-locations=classpath*:mapper/**/*.xml

# --- HikariCP Connection Pool Tuning ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=seahorse-hikari-pool
